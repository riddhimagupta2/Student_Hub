name: student_community_hub
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  # Utils
  uuid: ^4.5.3
  intl: ^0.20.2
  # Google Fonts
  google_fonts: ^8.1.0
  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  firebase_analytics: ^11.6.0

  # State Management & Navigation
  get: ^4.6.6

dependency_overrides:
  path_provider_android: 2.2.15

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_native_splash: ^2.4.6

  flutter_lints: ^6.0.0
flutter_launcher_icons:
  android: true
  ios: true

  image_path: "assets/logo/app_logo.png"

flutter_native_splash:
  color: "#6C63FF"
  image: assets/logo/app_logo.png

  android_12:
    color: "#6C63FF"
    image: assets/logo/app_logo.png

flutter:

  uses-material-design: true
  assets:
    - assets/logo/